{% extends "base.html" %}
{% block title %}TRON行为分析{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Tool header -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">TRON地址行为分析</h1>
        <p class="text-gray-600">分析地址行为模式：首次资金来源、交易模式、地址关系、活动时间线</p>
    </div>

    <!-- Input section -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-700 mb-4">输入TRON地址</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">TRON钱包地址</label>
                <input type="text" id="address-input"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="例如：TUtPdo7L45ey2KrpibdNcjNL3ujqXo1NNw">
            </div>
            <div class="flex space-x-4">
                <button onclick="loadSample()"
                        class="px-4 py-2 bg-gray-500 text-white rounded hover:bg-gray-600 transition">
                    加载样本
                </button>
                <button onclick="analyzeBehavior()"
                        class="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                    开始分析
                </button>
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden bg-white rounded-lg shadow p-6 mb-6">
        <div class="flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <span class="ml-3 text-gray-600">正在分析地址行为...</span>
        </div>
    </div>

    <!-- Error display -->
    <div id="error-display" class="hidden bg-red-100 border border-red-400 rounded-lg p-4 mb-6">
        <p id="error-message" class="text-red-700"></p>
    </div>

    <!-- Results section with 4 Summary Cards -->
    <div id="results" class="hidden">
        <!-- Card 1: First Funding Source -->
        <div id="funding-source-card" class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
                <span class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </span>
                首次资金来源
            </h2>
            <div id="funding-source-content" class="grid grid-cols-2 gap-4">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Card 2: Transfer Patterns -->
        <div id="transfer-patterns-card" class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
                <span class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                    </svg>
                </span>
                交易模式
            </h2>
            <div id="transfer-patterns-content" class="grid grid-cols-2 gap-4">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Card 3: Address Relationships -->
        <div id="relationships-card" class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
                <span class="w-8 h-8 bg-purple-100 rounded-full flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                </span>
                地址关系
            </h2>
            <div id="relationships-content">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Card 4: Activity Timeline -->
        <div id="timeline-card" class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4 flex items-center">
                <span class="w-8 h-8 bg-orange-100 rounded-full flex items-center justify-center mr-3">
                    <svg class="w-5 h-5 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </span>
                活动时间线
            </h2>
            <div id="timeline-content" class="grid grid-cols-2 gap-4">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Export buttons -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">导出结果</h2>
            <div class="flex space-x-4">
                <button onclick="exportJSON()"
                        class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition">
                    导出JSON
                </button>
                <button onclick="exportCSV()"
                        class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                    导出CSV
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let analysisResult = null;

function loadSample() {
    fetch('/tron/api/sample')
        .then(response => response.json())
        .then(data => {
            document.getElementById('address-input').value = data.address;
        })
        .catch(error => {
            alert('加载样本失败: ' + error.message);
        });
}

function analyzeBehavior() {
    const address = document.getElementById('address-input').value.trim();

    if (!address) {
        alert('请输入TRON地址');
        return;
    }

    // Show loading
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error-display').classList.add('hidden');
    document.getElementById('results').classList.add('hidden');

    fetch('/tron/api/behavior', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ address: address })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').classList.add('hidden');

        if (data.success) {
            analysisResult = data;
            displayResults(data);
        } else {
            showError(data.error || '分析失败');
        }
    })
    .catch(error => {
        document.getElementById('loading').classList.add('hidden');
        showError('请求失败: ' + error.message);
    });
}

function showError(message) {
    document.getElementById('error-message').textContent = message;
    document.getElementById('error-display').classList.remove('hidden');
}

function displayResults(data) {
    document.getElementById('results').classList.remove('hidden');

    // Display funding source
    displayFundingSource(data.behaviors.funding_source);

    // Display transfer patterns
    displayTransferPatterns(data.behaviors.transfer_patterns);

    // Display relationships
    displayRelationships(data.behaviors.relationships);

    // Display timeline
    displayTimeline(data.behaviors.timeline);
}

function displayFundingSource(funding) {
    const container = document.getElementById('funding-source-content');

    if (funding.status) {
        container.innerHTML = `
            <div class="col-span-2 bg-gray-50 p-4 rounded text-center">
                <p class="text-gray-500">${funding.status}</p>
            </div>
        `;
        return;
    }

    container.innerHTML = `
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">资助地址</span>
            <p class="font-bold text-gray-800 text-sm">${funding.funder_address}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">首次转入时间</span>
            <p class="font-bold text-gray-800">${funding.first_transfer_time_str}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">首次转入金额</span>
            <p class="font-bold text-gray-800">${funding.first_amount} USDT</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">资助方交易数</span>
            <p class="font-bold text-gray-800">${funding.funder_tx_count}</p>
        </div>
    `;
}

function displayTransferPatterns(patterns) {
    const container = document.getElementById('transfer-patterns-content');

    if (patterns.status) {
        container.innerHTML = `
            <div class="col-span-2 bg-gray-50 p-4 rounded text-center">
                <p class="text-gray-500">${patterns.status}</p>
            </div>
        `;
        return;
    }

    const ratioClass = patterns.in_out_ratio === '无穷大' ? 'text-red-600' :
                       patterns.in_out_ratio_raw > 5 ? 'text-green-600' :
                       patterns.in_out_ratio_raw < 0.5 ? 'text-red-600' : 'text-gray-800';

    container.innerHTML = `
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">转入总额</span>
            <p class="font-bold text-green-600">${patterns.total_in} USDT</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">转出总额</span>
            <p class="font-bold text-red-600">${patterns.total_out} USDT</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">入出比例</span>
            <p class="font-bold ${ratioClass}">${patterns.in_out_ratio}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">平均转账间隔</span>
            <p class="font-bold text-gray-800">${patterns.avg_transfer_interval_hours} 小时</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">转入次数</span>
            <p class="font-bold text-gray-800">${patterns.transfer_count_in}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">转出次数</span>
            <p class="font-bold text-gray-800">${patterns.transfer_count_out}</p>
        </div>
    `;
}

function displayRelationships(relationships) {
    const container = document.getElementById('relationships-content');

    if (relationships.status) {
        container.innerHTML = `
            <div class="bg-gray-50 p-4 rounded text-center">
                <p class="text-gray-500">${relationships.status}</p>
            </div>
        `;
        return;
    }

    let counterpartiesHtml = `
        <div class="mb-4 bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">互动地址数</span>
            <p class="font-bold text-gray-800">${relationships.unique_addresses_interacted}</p>
        </div>
        <h3 class="text-sm font-medium text-gray-700 mb-2">频繁交易对象（Top 5）</h3>
        <div class="space-y-2">
    `;

    for (const cp of relationships.top_counterparties) {
        counterpartiesHtml += `
            <div class="bg-gray-50 p-3 rounded">
                <div class="flex justify-between items-center">
                    <span class="text-sm font-medium text-gray-800">${cp.address_short}</span>
                    <span class="text-xs text-gray-500">${cp.interaction_count}次互动</span>
                </div>
                <div class="mt-1 text-xs text-gray-500">
                    总额: ${cp.total_amount} USDT (入: ${cp.total_in}, 出: ${cp.total_out})
                </div>
            </div>
        `;
    }

    counterpartiesHtml += '</div>';
    container.innerHTML = counterpartiesHtml;
}

function displayTimeline(timeline) {
    const container = document.getElementById('timeline-content');

    if (timeline.status) {
        container.innerHTML = `
            <div class="col-span-2 bg-gray-50 p-4 rounded text-center">
                <p class="text-gray-500">${timeline.status}</p>
            </div>
        `;
        return;
    }

    container.innerHTML = `
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">首次活动</span>
            <p class="font-bold text-gray-800">${timeline.first_activity_str}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">最后活动</span>
            <p class="font-bold text-gray-800">${timeline.last_activity_str}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">活跃天数</span>
            <p class="font-bold text-gray-800">${timeline.active_days} 天</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">总交易数</span>
            <p class="font-bold text-gray-800">${timeline.total_transfers}</p>
        </div>
        <div class="col-span-2 bg-orange-50 p-3 rounded">
            <span class="text-sm text-gray-500">高峰活动期</span>
            <p class="font-bold text-orange-700">${timeline.peak_activity_period.period_str} (${timeline.peak_activity_period.count}笔交易)</p>
        </div>
    `;
}

function exportJSON() {
    if (!analysisResult) {
        alert('请先进行地址分析');
        return;
    }

    fetch('/tron/api/export/behavior/json', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : 'behavior_analysis.json';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}

function exportCSV() {
    if (!analysisResult) {
        alert('请先进行地址分析');
        return;
    }

    fetch('/tron/api/export/behavior/csv', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: analysisResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filename = disposition ? disposition.split('filename=')[1].replace(/"/g, '') : 'behavior_analysis.csv';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}
</script>
{% endblock %}
