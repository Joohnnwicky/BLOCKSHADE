{% extends "base.html" %}
{% block title %}ETH交易查询{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <!-- Tool header -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">ETH交易查询</h1>
        <p class="text-gray-600">查询以太坊交易历史，识别Stargate跨链桥事件</p>
    </div>

    <!-- Input section -->
    <div class="bg-white rounded-lg shadow p-6 mb-6">
        <h2 class="text-lg font-bold text-gray-700 mb-4">输入查询参数</h2>
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">ETH钱包地址</label>
                <input type="text" id="address-input"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="例如：0x1234567890abcdef1234567890abcdef12345678">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Etherscan API密钥</label>
                <input type="text" id="api-key-input"
                       class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                       placeholder="从 etherscan.io 获取免费API密钥">
            </div>
            <div class="flex space-x-4">
                <button onclick="queryTransactions()"
                        class="px-6 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                    开始查询
                </button>
            </div>
        </div>
    </div>

    <!-- Loading indicator -->
    <div id="loading" class="hidden bg-white rounded-lg shadow p-6 mb-6">
        <div class="flex items-center justify-center">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
            <span class="ml-3 text-gray-600">正在查询交易记录...</span>
        </div>
    </div>

    <!-- Error display -->
    <div id="error-display" class="hidden bg-red-100 border border-red-400 rounded-lg p-4 mb-6">
        <p id="error-message" class="text-red-700"></p>
    </div>

    <!-- Results section -->
    <div id="results" class="hidden">
        <!-- Basic info -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">基本信息</h2>
            <div id="basic-info" class="grid grid-cols-2 gap-4"></div>
        </div>

        <!-- Normal transactions -->
        <div id="normal-transactions" class="hidden bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">ETH转账记录</h2>
            <div id="normal-list" class="overflow-x-auto"></div>
        </div>

        <!-- ERC20 transfers -->
        <div id="erc20-transactions" class="hidden bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">ERC20代币转账</h2>
            <div id="erc20-list" class="overflow-x-auto"></div>
        </div>

        <!-- Stargate events -->
        <div id="stargate-events" class="hidden bg-blue-50 border-l-4 border-blue-500 rounded-lg p-6 mb-6">
            <h2 class="text-lg font-bold text-blue-700 mb-4 flex items-center">
                <span class="mr-2">
                    <!-- Bridge icon SVG -->
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path>
                    </svg>
                </span>
                Stargate跨链桥事件
            </h2>
            <p class="text-sm text-blue-600 mb-4">检测到与Stargate跨链桥合约的交互记录，表明该地址可能参与了跨链转账。</p>
            <div id="stargate-list" class="space-y-4"></div>
        </div>

        <!-- Export buttons -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">导出结果</h2>
            <div class="flex space-x-4">
                <button onclick="exportJSON()"
                        class="px-4 py-2 bg-green-500 text-white rounded hover:bg-green-600 transition">
                    导出JSON
                </button>
                <button onclick="exportCSV()"
                        class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 transition">
                    导出CSV
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let queryResult = null;

function queryTransactions() {
    const address = document.getElementById('address-input').value.trim();
    const apiKey = document.getElementById('api-key-input').value.trim();

    if (!address) {
        alert('请输入ETH地址');
        return;
    }

    if (!apiKey) {
        alert('请输入Etherscan API密钥');
        return;
    }

    // Show loading
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('error-display').classList.add('hidden');
    document.getElementById('results').classList.add('hidden');

    // API key is sent per-request only, never stored
    fetch('/eth/api/query', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ address: address, api_key: apiKey })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('loading').classList.add('hidden');

        if (data.success) {
            queryResult = data;
            displayResults(data);
        } else {
            showError(data.error || '查询失败');
        }
    })
    .catch(error => {
        document.getElementById('loading').classList.add('hidden');
        showError('请求失败: ' + error.message);
    });
}

function showError(message) {
    document.getElementById('error-message').textContent = message;
    document.getElementById('error-display').classList.remove('hidden');
}

function displayResults(data) {
    document.getElementById('results').classList.remove('hidden');

    // Display basic info
    const basicInfo = document.getElementById('basic-info');
    const transactions = data.transactions || {};
    const totalCount = transactions.total_count || 0;
    const normalCount = (transactions.normal || []).length;
    const erc20Count = (transactions.erc20 || []).length;
    const bridgeCount = (data.bridge_events || []).length;

    basicInfo.innerHTML = `
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">查询地址</span>
            <p class="font-bold text-gray-800 text-sm">${data.address}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">总交易数</span>
            <p class="font-bold text-gray-800">${totalCount}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">ETH转账</span>
            <p class="font-bold text-gray-800">${normalCount}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">ERC20转账</span>
            <p class="font-bold text-gray-800">${erc20Count}</p>
        </div>
        <div class="bg-gray-50 p-3 rounded">
            <span class="text-sm text-gray-500">跨链桥事件</span>
            <p class="font-bold text-gray-800">${bridgeCount}</p>
        </div>
    `;

    // Display normal transactions
    displayTransactions('normal', transactions.normal || []);

    // Display ERC20 transfers
    displayERC20Transfers(transactions.erc20 || []);

    // Display bridge events if any
    displayBridgeEvents(data.bridge_events || []);
}

function formatTimestamp(ts) {
    if (!ts) return '未知';
    const date = new Date(parseInt(ts) * 1000);
    return date.toLocaleString('zh-CN');
}

function formatETHValue(valueWei) {
    if (!valueWei) return '0';
    const eth = parseFloat(valueWei) / 1e18;
    return eth.toFixed(6);
}

function displayTransactions(type, transactions) {
    const container = document.getElementById('normal-transactions');
    const list = document.getElementById('normal-list');

    if (transactions.length === 0) {
        container.classList.add('hidden');
        return;
    }

    container.classList.remove('hidden');

    // Create table
    list.innerHTML = `
        <table class="min-w-full text-sm">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-2 text-left">交易哈希</th>
                    <th class="px-4 py-2 text-left">时间</th>
                    <th class="px-4 py-2 text-left">发送方</th>
                    <th class="px-4 py-2 text-left">接收方</th>
                    <th class="px-4 py-2 text-left">金额(ETH)</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                ${transactions.slice(0, 20).map(tx => `
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-2 text-xs text-blue-600">
                            <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" class="hover:underline">
                                ${tx.hash ? tx.hash.slice(0, 10) + '...' + tx.hash.slice(-8) : '未知'}
                            </a>
                        </td>
                        <td class="px-4 py-2">${formatTimestamp(tx.timeStamp)}</td>
                        <td class="px-4 py-2 text-xs">${tx.from ? tx.from.slice(0, 8) + '...' + tx.from.slice(-6) : '未知'}</td>
                        <td class="px-4 py-2 text-xs">${tx.to ? tx.to.slice(0, 8) + '...' + tx.to.slice(-6) : '未知'}</td>
                        <td class="px-4 py-2">${formatETHValue(tx.value)}</td>
                    </tr>
                `).join('')}
            </tbody>
        </table>
        ${transactions.length > 20 ? '<p class="text-gray-500 text-xs mt-2">显示前20条记录，共' + transactions.length + '条</p>' : ''}
    `;
}

function displayERC20Transfers(transfers) {
    const container = document.getElementById('erc20-transactions');
    const list = document.getElementById('erc20-list');

    if (transfers.length === 0) {
        container.classList.add('hidden');
        return;
    }

    container.classList.remove('hidden');

    // Create table
    list.innerHTML = `
        <table class="min-w-full text-sm">
            <thead class="bg-gray-100">
                <tr>
                    <th class="px-4 py-2 text-left">交易哈希</th>
                    <th class="px-4 py-2 text-left">时间</th>
                    <th class="px-4 py-2 text-left">代币</th>
                    <th class="px-4 py-2 text-left">发送方</th>
                    <th class="px-4 py-2 text-left">接收方</th>
                    <th class="px-4 py-2 text-left">金额</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
                ${transfers.slice(0, 20).map(tx => {
                    const decimals = parseInt(tx.tokenDecimal) || 18;
                    const value = parseFloat(tx.value || 0) / Math.pow(10, decimals);
                    const symbol = tx.tokenSymbol || '未知';
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-2 text-xs text-blue-600">
                                <a href="https://etherscan.io/tx/${tx.hash}" target="_blank" class="hover:underline">
                                    ${tx.hash ? tx.hash.slice(0, 10) + '...' + tx.hash.slice(-8) : '未知'}
                                </a>
                            </td>
                            <td class="px-4 py-2">${formatTimestamp(tx.timeStamp)}</td>
                            <td class="px-4 py-2 font-medium">${symbol}</td>
                            <td class="px-4 py-2 text-xs">${tx.from ? tx.from.slice(0, 8) + '...' + tx.from.slice(-6) : '未知'}</td>
                            <td class="px-4 py-2 text-xs">${tx.to ? tx.to.slice(0, 8) + '...' + tx.to.slice(-6) : '未知'}</td>
                            <td class="px-4 py-2">${value.toFixed(4)}</td>
                        </tr>
                    `;
                }).join('')}
            </tbody>
        </table>
        ${transfers.length > 20 ? '<p class="text-gray-500 text-xs mt-2">显示前20条记录，共' + transfers.length + '条</p>' : ''}
    `;
}

function displayBridgeEvents(events) {
    const container = document.getElementById('stargate-events');
    const list = document.getElementById('stargate-list');

    if (events.length === 0) {
        container.classList.add('hidden');
        return;
    }

    container.classList.remove('hidden');

    list.innerHTML = events.map(event => `
        <div class="bg-white rounded p-4 shadow-sm border border-blue-200">
            <div class="flex justify-between items-start mb-2">
                <p class="font-bold text-gray-800">${event.bridge || '跨链桥合约交互'}</p>
                <span class="text-xs text-gray-500">${event.time || '未知'}</span>
            </div>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div>
                    <span class="text-gray-500">交易哈希:</span>
                    <a href="https://etherscan.io/tx/${event.tx_hash}" target="_blank" class="text-blue-600 hover:underline ml-1 text-xs">
                        ${event.tx_hash ? event.tx_hash.slice(0, 10) + '...' + event.tx_hash.slice(-8) : '未知'}
                    </a>
                </div>
                <div>
                    <span class="text-gray-500">跨链桥:</span>
                    <span class="ml-1 font-medium">${event.bridge || '未知'}</span>
                </div>
                <div>
                    <span class="text-gray-500">发送方:</span>
                    <span class="ml-1 text-xs">${event.from ? event.from.slice(0, 8) + '...' + event.from.slice(-6) : '未知'}</span>
                </div>
                <div>
                    <span class="text-gray-500">接收方:</span>
                    <span class="ml-1 text-xs">${event.to ? event.to.slice(0, 8) + '...' + event.to.slice(-6) : '未知'}</span>
                </div>
                <div>
                    <span class="text-gray-500">金额:</span>
                    <span class="ml-1 font-medium">${event.amount ? event.amount.toFixed(6) : '未知'} ${event.token || 'ETH'}</span>
                </div>
                ${event.dest_chain ? `
                <div>
                    <span class="text-gray-500">目标链:</span>
                    <span class="ml-1 font-medium text-blue-600">${event.dest_chain}</span>
                </div>
                ` : ''}
            </div>
            <p class="text-xs text-blue-600 mt-2">此交易与跨链桥合约交互，可能涉及跨链资产转移。</p>
        </div>
    `).join('');
}

function exportJSON() {
    if (!queryResult) {
        alert('请先进行交易查询');
        return;
    }

    fetch('/eth/api/export/json', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: queryResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filenameMatch = disposition && disposition.match(/filename="?([^"]+)"?/);
        const filename = filenameMatch ? filenameMatch[1] : 'eth_export.json';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}

function exportCSV() {
    if (!queryResult) {
        alert('请先进行交易查询');
        return;
    }

    fetch('/eth/api/export/csv', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({ result: queryResult })
    })
    .then(response => {
        const disposition = response.headers.get('Content-Disposition');
        const filenameMatch = disposition && disposition.match(/filename="?([^"]+)"?/);
        const filename = filenameMatch ? filenameMatch[1] : 'eth_export.csv';
        return response.blob().then(blob => ({ blob, filename }));
    })
    .then(({ blob, filename }) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        window.URL.revokeObjectURL(url);
    })
    .catch(error => {
        alert('导出失败: ' + error.message);
    });
}
</script>
{% endblock %}
